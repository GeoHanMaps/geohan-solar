events {
    worker_connections 1024;
}

http {
    # HTTP → HTTPS yönlendirme
    server {
        listen 80;
        server_name geohanmaps.com www.geohanmaps.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — ana sunucu
    server {
        listen 443 ssl;
        server_name geohanmaps.com www.geohanmaps.com;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Güvenlik başlıkları
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options     "nosniff" always;
        add_header X-Frame-Options            "DENY" always;
        add_header X-XSS-Protection           "1; mode=block" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org; connect-src 'self'; font-src 'self'; frame-ancestors 'none'" always;

        # Sunucu imzasını gizle
        server_tokens off;

        # İstek boyutu sınırı
        client_max_body_size 1M;

        # Rate limiting (API endpoint'leri için)
        limit_req_zone $binary_remote_addr zone=api:10m rate=10r/m;
        limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass         http://api:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://api:8000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout    120s;
            proxy_connect_timeout 10s;
        }

        location /ui {
            proxy_pass http://api:8000/ui;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Swagger/OpenAPI — sadece yerel ağdan erişilebilir
        location ~ ^/(docs|openapi.json|redoc) {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://api:8000;
            proxy_set_header Host $host;
        }
    }
}
