services:
  api:
    image: ${API_IMAGE:-geohan-api:latest}
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg2://geohan:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:5432/geohan
    volumes:
      - gee-credentials:/home/geohan/.config/earthengine
      - ./secrets:/app/secrets:ro
      - ./config:/app/config:ro
      - ./cache:/app/cache
      - maps-data:/app/data/maps
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          memory: 256M

  worker:
    image: ${API_IMAGE:-geohan-api:latest}
    command: celery -A app.celery_app.celery_app worker --beat --loglevel=info --concurrency=2
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg2://geohan:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:5432/geohan
    volumes:
      - gee-credentials:/home/geohan/.config/earthengine
      - ./secrets:/app/secrets:ro
      - ./config:/app/config:ro
      - ./cache:/app/cache
      - maps-data:/app/data/maps
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "app.celery_app.celery_app", "inspect", "ping", "-t", "5"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 512M

  redis:
    image: redis:7.2-alpine
    expose:
      - "6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 300M

  postgres:
    image: postgres:16-alpine
    expose:
      - "5432"
    environment:
      POSTGRES_USER: geohan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: geohan
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geohan -d geohan"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  gee-credentials:
  maps-data:
  nginx-logs:
  postgres-data:
