name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy even without changes"
        required: false
        default: "false"

jobs:
  build-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: sha-${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/geohanmaps/geohan-api
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          provenance: false

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-push
    environment: production
    permissions:
      packages: read

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            set -euo pipefail
            cd /home/geohan/geohan/geohan-solar

            git fetch origin main
            git reset --hard origin/main

            IMAGE="ghcr.io/geohanmaps/geohan-api:${{ needs.build-push.outputs.image_tag }}"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Önceki image SHA'sını kaydet (rollback için)
            API_CID=$(docker compose -f docker-compose.prod.yml ps -q api 2>/dev/null || true)
            PREV_IMAGE=$([ -n "$API_CID" ] && docker inspect "$API_CID" --format '{{.Image}}' 2>/dev/null || echo "")

            echo "Deploying: $IMAGE"
            echo "Previous:  $PREV_IMAGE"

            # .env içinde API_IMAGE'ı güncelle
            if grep -q '^API_IMAGE=' .env; then
              sed -i "s|^API_IMAGE=.*|API_IMAGE=$IMAGE|" .env
            else
              echo "API_IMAGE=$IMAGE" >> .env
            fi

            # Yeni image'ı çek ve servisleri başlat
            docker pull "$IMAGE"
            docker compose -f docker-compose.prod.yml up -d api worker

            # DB migration — container running olana kadar bekle (max 30s)
            for i in $(seq 1 6); do
              sleep 5
              STATE=$(docker compose -f docker-compose.prod.yml ps api --format json 2>/dev/null \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['State'] if isinstance(d,list) else d['State'])" 2>/dev/null || echo "unknown")
              [ "$STATE" = "running" ] && break
              echo "  API container bekleniyor... ($i/6) — $STATE"
            done
            docker compose -f docker-compose.prod.yml exec -T api alembic upgrade head

            # Health check — 60 saniye boyunca dene
            echo "Health check başlıyor..."
            HEALTHY=0
            for i in $(seq 1 12); do
              sleep 5
              STATUS=$(curl -sf http://localhost:8000/api/v1/health \
                | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])" \
                2>/dev/null || echo "error")
              if [ "$STATUS" = "ok" ]; then
                echo "  Sağlıklı (${i}x5s)"
                HEALTHY=1
                break
              fi
              echo "  Bekleniyor... ($i/12) — $STATUS"
            done

            if [ "$HEALTHY" -eq 0 ]; then
              echo "HATA: Health check başarısız — rollback yapılıyor"
              if [ -n "$PREV_IMAGE" ]; then
                sed -i "s|^API_IMAGE=.*|API_IMAGE=$PREV_IMAGE|" .env
                docker pull "$PREV_IMAGE" 2>/dev/null || true
                docker compose -f docker-compose.prod.yml up -d api worker
                echo "Rollback tamamlandı: $PREV_IMAGE"
              fi
              exit 1
            fi

            echo "Deploy başarılı: $IMAGE"
            docker compose -f docker-compose.prod.yml ps
