name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy even without changes"
        required: false
        default: "false"

jobs:
  build-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: sha-${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/geohan-api
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          fingerprint: "SHA256:GkmqxQgrboz/xc6etq+VXHZkGWWBSguYxG7GDteI/L0"
          script: |
            set -euo pipefail
            cd /home/geohan/geohan/geohan-solar

            IMAGE="ghcr.io/${{ github.repository_owner }}/geohan-api:${{ needs.build-push.outputs.image_tag }}"

            # Önceki image SHA'sını kaydet (rollback için)
            PREV_IMAGE=$(docker inspect \
              $(docker compose -f docker-compose.prod.yml ps -q api 2>/dev/null) \
              --format '{{.Image}}' 2>/dev/null || echo "")

            echo "Deploying: $IMAGE"
            echo "Previous:  $PREV_IMAGE"

            # .env içinde API_IMAGE'ı güncelle
            if grep -q '^API_IMAGE=' .env; then
              sed -i "s|^API_IMAGE=.*|API_IMAGE=$IMAGE|" .env
            else
              echo "API_IMAGE=$IMAGE" >> .env
            fi

            # Yeni image'ı çek ve servisleri başlat
            docker pull "$IMAGE"
            docker compose -f docker-compose.prod.yml up -d api worker

            # Health check — 60 saniye boyunca dene
            echo "Health check başlıyor..."
            HEALTHY=0
            for i in $(seq 1 12); do
              sleep 5
              STATUS=$(curl -sf http://localhost:8000/api/v1/health \
                | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])" \
                2>/dev/null || echo "error")
              if [ "$STATUS" = "ok" ]; then
                echo "  Sağlıklı (${i}x5s)"
                HEALTHY=1
                break
              fi
              echo "  Bekleniyor... ($i/12) — $STATUS"
            done

            if [ "$HEALTHY" -eq 0 ]; then
              echo "HATA: Health check başarısız — rollback yapılıyor"
              if [ -n "$PREV_IMAGE" ]; then
                sed -i "s|^API_IMAGE=.*|API_IMAGE=$PREV_IMAGE|" .env
                docker pull "$PREV_IMAGE" 2>/dev/null || true
                docker compose -f docker-compose.prod.yml up -d api worker
                echo "Rollback tamamlandı: $PREV_IMAGE"
              fi
              exit 1
            fi

            echo "Deploy başarılı: $IMAGE"
            docker compose -f docker-compose.prod.yml ps
