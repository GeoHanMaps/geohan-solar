name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: sha-${{ github.sha }}

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/geohanmaps/geohan-api
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          provenance: false

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-push
    environment: production
    permissions:
      packages: read

    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          H: ${{ secrets.DEPLOY_HOST }}
          U: ${{ secrets.DEPLOY_USER }}
          IMAGE: ghcr.io/geohanmaps/geohan-api:${{ needs.build-push.outputs.image_tag }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          envsubst '$IMAGE $GHCR_TOKEN $GHCR_USER' << 'SCRIPT' | ssh "${U}@${H}" bash -s
          set -euo pipefail
          cd /home/geohan/geohan/geohan-solar
          git fetch origin main
          git reset --hard origin/main

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

          API_CID=$(docker compose -f docker-compose.prod.yml ps -q api 2>/dev/null || true)
          PREV_IMAGE=$([ -n "$API_CID" ] && docker inspect "$API_CID" --format '{{.Image}}' 2>/dev/null || echo "")
          echo "Deploying: $IMAGE"

          if grep -q '^API_IMAGE=' .env; then
            sed -i "s|^API_IMAGE=.*|API_IMAGE=$IMAGE|" .env
          else
            echo "API_IMAGE=$IMAGE" >> .env
          fi

          docker pull "$IMAGE"
          docker compose -f docker-compose.prod.yml up -d api worker

          for i in $(seq 1 6); do
            sleep 5
            STATE=$(docker compose -f docker-compose.prod.yml ps api --format json 2>/dev/null \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['State'] if isinstance(d,list) else d['State'])" 2>/dev/null || echo "unknown")
            [ "$STATE" = "running" ] && break
            echo "  API bekleniyor... ($i/6) — $STATE"
          done
          docker compose -f docker-compose.prod.yml exec -T api alembic upgrade head

          HEALTHY=0
          for i in $(seq 1 12); do
            sleep 5
            STATUS=$(curl -sf http://localhost:8000/api/v1/health \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])" \
              2>/dev/null || echo "error")
            [ "$STATUS" = "ok" ] && HEALTHY=1 && break
            echo "  Bekleniyor... ($i/12) — $STATUS"
          done

          if [ "$HEALTHY" -eq 0 ]; then
            echo "HATA: health check başarısız — rollback"
            if [ -n "$PREV_IMAGE" ]; then
              sed -i "s|^API_IMAGE=.*|API_IMAGE=$PREV_IMAGE|" .env
              docker pull "$PREV_IMAGE" 2>/dev/null || true
              docker compose -f docker-compose.prod.yml up -d api worker
            fi
            exit 1
          fi
          echo "Deploy başarılı: $IMAGE"
          SCRIPT
