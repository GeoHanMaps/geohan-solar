name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install ruff bandit

      - name: ruff
        run: ruff check app/ tests/

      - name: bandit
        run: bandit -r app/ -ll -q

  test:
    name: Tests (Docker)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: geohan
          POSTGRES_PASSWORD: geohan
          POSTGRES_DB: geohan_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U geohan"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t geohan-test:ci .

      # --network host lets the sibling test container reach the Postgres
      # service on the runner's localhost:5432. DATABASE_URL gates the
      # Postgres-only FOR UPDATE proof (test_pg_concurrency); the rest of
      # the suite still runs on in-memory SQLite.
      - name: Run pytest
        run: |
          docker run --rm \
            --network host \
            -e SECRET_KEY=ci-test-secret-placeholder-000000000000 \
            -e GEE_PROJECT=geohan-ci \
            -e DEBUG=true \
            -e DATABASE_URL=postgresql+psycopg2://geohan:geohan@localhost:5432/geohan_test \
            geohan-test:ci \
            python -m pytest tests/ --tb=short -q

  build-verify:
    name: Production build check
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t geohan-api:${{ github.sha }} .
