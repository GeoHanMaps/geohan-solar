name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install ruff bandit

      - name: ruff
        run: ruff check app/ tests/

      - name: bandit
        run: bandit -r app/ -ll -q

  test:
    name: Tests (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t geohan-test:ci .

      - name: Run pytest
        run: |
          docker run --rm \
            -e SECRET_KEY=ci-test-secret-placeholder-000000000000 \
            -e GEE_PROJECT=geohan-ci \
            -e DEBUG=true \
            geohan-test:ci \
            python -m pytest tests/ --tb=short -q

  build-verify:
    name: Production build check
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: geohan-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
