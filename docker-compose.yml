services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg2://geohan:geohan@postgres:5432/geohan
      - DEBUG=true
    volumes:
      - gee-credentials:/home/geohan/.config/earthengine
      - ./secrets:/app/secrets:ro
      - ./config:/app/config:ro
      - ./cache:/app/cache
      - maps-data:/app/data/maps
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    command: celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg2://geohan:geohan@postgres:5432/geohan
    volumes:
      - gee-credentials:/home/geohan/.config/earthengine
      - ./secrets:/app/secrets:ro
      - ./config:/app/config:ro
      - ./cache:/app/cache
      - maps-data:/app/data/maps
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: geohan
      POSTGRES_PASSWORD: geohan
      POSTGRES_DB: geohan
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geohan -d geohan"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  gee-credentials:
  maps-data:
  postgres-data:
